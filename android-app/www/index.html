<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <title>Lad Admin</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f0e7;
        color: #2d4a3e;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(143, 174, 139, 0.22), transparent 42%),
          linear-gradient(180deg, #fdfbf7 0%, #f6f0e7 100%);
      }

      main {
        width: min(26rem, calc(100% - 2rem));
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 24px 60px rgba(45, 74, 62, 0.12);
        padding: 2rem;
        text-align: center;
      }

      .spinner {
        width: 3rem;
        height: 3rem;
        margin: 0 auto 1rem;
        border-radius: 999px;
        border: 4px solid rgba(143, 174, 139, 0.2);
        border-top-color: #6b8f67;
        animation: spin 0.9s linear infinite;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: rgba(45, 74, 62, 0.75);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="spinner" aria-hidden="true"></div>
      <h1>Lad Admin</h1>
      <p>Открываем админ-панель и загружаем заявки.</p>
    </main>
  </body>
  </html>
